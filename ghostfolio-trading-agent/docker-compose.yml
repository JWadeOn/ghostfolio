version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ghostfolio-db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

  ghostfolio:
    image: ghostfolio/ghostfolio:latest
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/ghostfolio-db?sslmode=prefer
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: super-secret-jwt-key
      ACCESS_TOKEN_SALT: super-secret-salt
    ports:
      - '3333:3333'
    depends_on:
      - postgres
      - redis

  trading-agent:
    build: .
    environment:
      GHOSTFOLIO_API_URL: http://ghostfolio:3333
      GHOSTFOLIO_ACCESS_TOKEN: ${GHOSTFOLIO_ACCESS_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LANGCHAIN_TRACING_V2: 'true'
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ghostfolio-trading-agent
    ports:
      - '8000:8000'
    depends_on:
      - ghostfolio

volumes:
  postgres_data:
