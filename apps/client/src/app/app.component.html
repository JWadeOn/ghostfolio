<header>
  @if (canCreateAccount || user?.systemMessage) {
    <div class="info-message-container">
      <div class="info-message-inner-container position-fixed w-100">
        <div class="align-items-center d-flex h-100 justify-content-center">
          @if (canCreateAccount) {
            <a class="text-center" [routerLink]="routerLinkRegister">
              <div
                class="cursor-pointer d-inline-block info-message"
                (click)="onCreateAccount()"
              >
                <span i18n>You are using the Live Demo.</span>
                <span class="a ml-2 p-1" i18n>Create Account</span>
              </div>
            </a>
          }
          @if (!canCreateAccount && user?.systemMessage) {
            <div
              class="cursor-pointer d-inline-block info-message text-truncate"
              (click)="onClickSystemMessage()"
            >
              {{ user.systemMessage.message }}
            </div>
          }
        </div>
      </div>
    </div>
  }

  <gf-header
    class="position-fixed w-100"
    [currentRoute]="currentRoute"
    [deviceType]="deviceType"
    [hasPermissionToChangeDateRange]="hasPermissionToChangeDateRange"
    [hasPermissionToChangeFilters]="hasPermissionToChangeFilters"
    [hasPromotion]="hasPromotion"
    [hasTabs]="hasTabs"
    [info]="info"
    [pageTitle]="pageTitle"
    [user]="user"
    (signOut)="onSignOut()"
  />
</header>

<main role="main">
  <router-outlet />
</main>

@if (showFooter) {
  <footer class="justify-content-center overflow-hidden w-100">
    <gf-footer class="py-4" [info]="info" [user]="user" />
  </footer>
}

@if (showTradingAgentFab) {
  @if (isChatWidgetOpen) {
    <gf-trading-agent-widget (closed)="onChatWidgetClosed()"></gf-trading-agent-widget>
  }

  <div
    class="trading-agent-float"
    [style]="getTradingAgentWidgetStyle()"
    (mousedown)="onTradingAgentWidgetPointerDown($event)"
    (touchstart)="onTradingAgentWidgetPointerDown($event)"
    role="presentation"
  >
    <button
      type="button"
      class="trading-agent-fab"
      [class.trading-agent-fab-open]="isChatWidgetOpen"
      (click)="onTradingAgentFabClick($event)"
      [attr.aria-label]="isChatWidgetOpen ? 'Close chat' : 'Open Trading Assistant'"
      title="Trading Assistant"
      i18n-title
    >
      <span class="trading-agent-fab-ring"></span>
      @if (isChatWidgetOpen) {
        <svg class="trading-agent-fab-icon trading-agent-fab-close-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      } @else {
        <svg class="trading-agent-fab-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path
            class="ghost-body"
            d="M32 8 C14 8 6 22 6 36 L6 50 L14 44 L22 50 L32 42 L42 50 L50 44 L58 50 L58 36 C58 22 50 8 32 8 Z"
            fill="currentColor"
          />
          <circle class="ghost-eye" cx="24" cy="28" r="3.5" fill="var(--ghost-eye-fill, #fff)"/>
          <circle class="ghost-eye" cx="40" cy="28" r="3.5" fill="var(--ghost-eye-fill, #fff)"/>
        </svg>
      }
    </button>
  </div>
}
